<!DOCTYPE html>
<html lang="fr">
    <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Eowea - Builds HotS</title>
  <link rel="icon" type="image/png" href="https://static.wikia.nocookie.net/allstars_gamepedia/images/e/e5/Emoji_Elements_Pack_Flower.png/">
  
  <!-- C'est ici qu'on relie le design ! -->
  <link rel="stylesheet" href="style.css">
  
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>
  <nav class="socials" id="socials" aria-label="Réseaux sociaux"></nav>
  
<div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn" data-lang="fr"><img src="https://flagicons.lipis.dev/flags/4x3/fr.svg" alt="FR"></button>
      <button class="lang-btn" data-lang="en"><img src="https://flagicons.lipis.dev/flags/4x3/gb.svg" alt="EN"></button>
  </div>
  <div class="page">
<header class="panel topbar">
  <div class="brand-block">
    <div class="eyebrow">Heroes of the Storm</div>
    <div class="title-row">
      <div>
        <h1 class="site-title" id="siteTitle">Eowea builds</h1>
        <p class="site-subtitle" id="siteSubtitle"></p>
      </div>
    </div>
  </div>

  <!-- Déplacez le switcher ici ! -->
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="fr">
        <img src="https://flagicons.lipis.dev/flags/4x3/fr.svg" alt="FR">
    </button>
    <button class="lang-btn" data-lang="en">
        <img src="https://flagicons.lipis.dev/flags/4x3/gb.svg" alt="EN">
    </button>
  </div>
</header>
    <section class="panel toolbar">
      <div class="filters" id="roleFilters" role="tablist" aria-label="Filtrer par rôle"></div>
      <div class="toolbar-row">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input class="search" id="searchInput" type="search" placeholder="Rechercher un héros..." autocomplete="off" />
        </div>
        <div class="counter" id="resultsCount">0 résultats</div>
      </div>
    </section>

    <main class="layout">
      <aside class="panel sidebar">
        <h2 class="section-title" id="heroesTitle">Héros</h2>
        <p class="section-note" id="heroesNote">Choisis un héros dans la liste, ou utilise la recherche et les filtres ci-dessus.</p>
        <div class="hero-list" id="heroList" role="listbox" aria-label="Liste des héros"></div>
      </aside>
      <section class="panel content" id="detailViewWrap">
        <div id="detailView"></div>
      </section>
    </main>
  </div>

  <div id="tooltipPortal" class="spell-portal" aria-hidden="true"></div>

  <div id="videoOverlay" class="video-overlay" role="dialog" aria-hidden="true" aria-label="Lecteur video">
    <button class="close-overlay" id="closeOverlayBtn" type="button" aria-label="Fermer">&times;</button>
    <div class="overlay-status">
      <div class="overlay-status-box">
        <span class="overlay-spinner"></span>
        <span id="overlayStatusText">Chargement...</span>
      </div>
    </div>
    <div class="video-modal">
      <div class="video-frame">
        <iframe id="expandedYoutube" title="Lecteur YouTube" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
        <video id="expandedMedia" style="display:none;width:100%;height:100%;object-fit:contain;background:#000;" controls autoplay muted loop playsinline></video>
      </div>
    </div>
  </div>
    <!-- BOUTON RETOUR EN HAUT -->
  <button id="backToTop" aria-label="Remonter" title="Remonter en haut">
      <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path d="M13 7.828V20h-2V7.828l-5.364 5.364-1.414-1.414L12 4l7.778 7.778-1.414 1.414L13 7.828z"/>
      </svg>
  </button>
  <!-- C'est ici qu'on relie ton code logique et tes héros ! -->
  <script src="data.js"></script>
  <script src="app.js"></script>

<script>
  // Utilisation de "l'Event Delegation" : on écoute le document entier
  document.addEventListener("click", function(e) {
    // Cette logique ne s'active que sur mobile/tablette
    if (window.innerWidth <= 768) {
      
      // On vérifie si l'élément cliqué est un réseau social (ou une icône à l'intérieur)
      const socialLink = e.target.closest("#socials .social-link");
      
      if (socialLink) {
        // On a cliqué sur un réseau social !
        // S'il est FERMÉ, on bloque le lien et on l'ouvre
        if (!socialLink.classList.contains("is-open")) {
          e.preventDefault(); // Bloque la redirection
          
          // On referme tous les autres liens
          document.querySelectorAll("#socials .social-link").forEach(l => l.classList.remove("is-open"));
          
          // On ouvre celui sur lequel on vient d'appuyer
          socialLink.classList.add("is-open");
        }
        // S'il est déjà ouvert, on ne fait rien, le navigateur va suivre le lien naturellement.
      } else {
        // Si on a cliqué N'IMPORTE OÙ AILLEURS (ex: sur un héros), on referme les réseaux
        document.querySelectorAll("#socials .social-link").forEach(l => l.classList.remove("is-open"));
      }
    }
  });

  // Sécurité indispensable pour iOS (iPhone/iPad) : refermer quand on touche une zone "morte"
  document.addEventListener("touchstart", function(e) {
    if (window.innerWidth <= 768 && !e.target.closest("#socials")) {
      document.querySelectorAll("#socials .social-link").forEach(l => l.classList.remove("is-open"));
    }
  }, { passive: true });
</script>
</body>
</html>
